<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم العربي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #2d1a0f 0%, #4a2e1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            font-family: 'Cairo', 'Amiri', sans-serif;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background-color: #fef7e9;
            border-radius: 40px 40px 20px 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            padding: 30px 25px;
            border: 2px solid #b48647;
            position: relative;
        }
        
        h1 {
            text-align: center;
            color: #7a4f24;
            margin-bottom: 30px;
            font-size: 3.2em;
            font-family: 'Amiri', serif;
            font-weight: 700;
            border-bottom: 3px solid #c9a063;
            padding-bottom: 15px;
            text-shadow: 3px 3px 0 #f0dbb4;
        }
        
        h1::after {
            content: "⚘";
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            color: #b47d47;
            background-color: #fef7e9;
            padding: 0 20px;
        }
        
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }
        
        .menu-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        
        .menu-btn {
            flex: 1 1 160px;
            padding: 18px 15px;
            font-size: 1.3em;
            font-weight: 700;
            border: none;
            border-radius: 60px 20px 60px 20px;
            background: linear-gradient(145deg, #ac7b3f, #7a4f24);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 0 #4a2e1a;
            text-align: center;
            min-width: 160px;
            font-family: 'Cairo', sans-serif;
            border: 2px solid #e5b87b;
        }
        
        .menu-btn:hover {
            background: linear-gradient(145deg, #be8b4f, #8b5f34);
            transform: translateY(-5px);
            box-shadow: 0 13px 0 #4a2e1a;
        }
        
        .menu-btn.special {
            background: linear-gradient(145deg, #b35e1f, #7a431d);
        }
        
        .quiz-area {
            margin-top: 20px;
            background-color: #fff9f0;
            border-radius: 30px;
            padding: 20px;
            border: 2px solid #e5c8a3;
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: linear-gradient(145deg, #7a4f24, #9b6b3b);
            padding: 15px 25px;
            border-radius: 60px;
            color: white;
            border: 2px solid #e5b87b;
        }
        
        .unit-badge, .progress {
            background-color: #f7d9a4;
            color: #4a2e1a;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1.2em;
            font-weight: 700;
            border: 2px solid #b48647;
        }
        
        .question-text {
            font-size: 1.5em;
            font-weight: 600;
            color: #4a2e1a;
            margin-bottom: 30px;
            line-height: 1.7;
            background: linear-gradient(145deg, #fff9f0, #fff2e0);
            padding: 30px;
            border-radius: 30px 30px 30px 10px;
            border: 2px solid #d4b68a;
            border-right: 8px solid #b47d47;
            font-family: 'Amiri', serif;
        }
        
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .option-btn {
            padding: 18px 25px;
            background: linear-gradient(145deg, #ffffff, #f7efe0);
            border: 3px solid #d4b68a;
            border-radius: 50px 15px 50px 15px;
            font-size: 1.2em;
            text-align: right;
            cursor: pointer;
            color: #4a2e1a;
            font-weight: 600;
            box-shadow: 0 5px 0 #b48647;
            font-family: 'Cairo', sans-serif;
            width: 100%;
        }
        
        .option-btn:hover {
            background: linear-gradient(145deg, #f7efe0, #ffffff);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #b48647;
            border-color: #b47d47;
        }
        
        .option-btn.selected {
            background: linear-gradient(145deg, #b47d47, #9b6b3b);
            color: white;
            border-color: #7a4f24;
            box-shadow: 0 5px 0 #4a2e1a;
            transform: translateY(2px);
        }
        
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 15px 25px;
            font-size: 1.2em;
            font-weight: 700;
            border: none;
            border-radius: 40px 15px 40px 15px;
            background: linear-gradient(145deg, #d4b68a, #b48647);
            color: #2d1a0f;
            cursor: pointer;
            border: 2px solid #e5c8a3;
            box-shadow: 0 5px 0 #7a4f24;
            flex: 1;
            min-width: 120px;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: linear-gradient(145deg, #e5c8a3, #c9a063);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #7a4f24;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #7a4f24;
        }
        
        .result-screen {
            text-align: center;
            padding: 15px;
        }
        
        .result-box {
            background: linear-gradient(145deg, #fff9f0, #fff2e0);
            border-radius: 50px 20px 50px 20px;
            padding: 40px 30px;
            margin-top: 15px;
            border: 4px solid #b47d47;
        }
        
        .result-score {
            font-size: 5em;
            font-weight: 800;
            color: #b47d47;
            margin: 20px 0;
            font-family: 'Amiri', serif;
        }
        
        .result-details {
            max-height: 500px;
            overflow-y: auto;
            text-align: right;
            margin-top: 30px;
            border-top: 3px solid #d4b68a;
            padding: 25px;
            background: white;
            border-radius: 30px;
        }
        
        .result-item {
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 20px;
            border-right: 8px solid #b48647;
            background: #f5e9d9;
        }
        
        .result-item.correct {
            border-right-color: #2e7d32;
            background: #e8f5e9;
        }
        
        .result-item.wrong {
            border-right-color: #b71c1c;
            background: #ffebee;
        }
        
        .restart-btn {
            margin-top: 30px;
            padding: 18px 50px;
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(145deg, #b47d47, #7a4f24);
            color: white;
            border: none;
            border-radius: 60px 20px 60px 20px;
            cursor: pointer;
            border: 2px solid #e5b87b;
            box-shadow: 0 8px 0 #4a2e1a;
        }
        
        .restart-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 13px 0 #4a2e1a;
        }
        
        .hidden {
            display: none;
        }
        
        .decor-line {
            height: 4px;
            background: linear-gradient(90deg, transparent, #b47d47, #e5b87b, #b47d47, transparent);
            margin: 25px 0 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>قسم العربي</h1>
        <div class="decor-line"></div>

        <!-- القائمة الرئيسية -->
        <div id="mainMenu" class="main-menu">
            <div class="menu-row">
                <button class="menu-btn" onclick="startQuiz('unit1')">في رحاب القدس</button>
                <button class="menu-btn" onclick="startQuiz('unit2')">من الأدب الإفريقي</button>
                <button class="menu-btn" onclick="startQuiz('unit3')">من القيم الإنسانية</button>
            </div>
            <div class="menu-row">
                <button class="menu-btn" onclick="startQuiz('unit4')">فن المقامات</button>
                <button class="menu-btn" onclick="startQuiz('unit5')">الذكاء الاصطناعي</button>
                <button class="menu-btn special" onclick="startQuiz('final')">الامتحان الشامل</button>
            </div>
        </div>

        <!-- منطقة الامتحان -->
        <div id="quizArea" class="quiz-area hidden">
            <div class="question-header">
                <span id="unitName" class="unit-badge"></span>
                <span id="questionCounter" class="progress"></span>
            </div>
            <div id="questionText" class="question-text"></div>
            <div id="optionsContainer" class="options-container"></div>
            <div class="nav-buttons">
                <button id="prevBtn" class="nav-btn" onclick="prevQuestion()">السابق</button>
                <button id="nextBtn" class="nav-btn" onclick="nextQuestion()">التالي</button>
                <button id="backToMenuBtn" class="nav-btn" onclick="backToMenu()">القائمة</button>
            </div>
        </div>

        <!-- شاشة النتيجة -->
        <div id="resultScreen" class="result-screen hidden">
            <div class="result-box">
                <h2>النتيجة النهائية</h2>
                <div id="finalScore" class="result-score"></div>
                <div class="decor-line"></div>
                <div id="resultDetails" class="result-details"></div>
                <button class="restart-btn" onclick="backToMenu()">العودة للقائمة</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== جميع الأسئلة (20 سؤال لكل وحدة) ====================
        
        // وحدة 1: في رحاب القدس
        const unit1Questions = [
            { question: "الشاعر الذي نظم قصيدة \"فتح طبرية\" هو:", options: ["البحتري", "ابن الساعاتي", "المتنبي", "حيدر محمود"], correct: 1 },
            { question: "المناسبة التي قيلت فيها قصيدة \"فتح طبرية\" هي:", options: ["فتح بيت المقدس", "معركة اليرموك", "انتصار صلاح الدين في حطين", "معركة عين جالوت"], correct: 2 },
            { question: "معنى كلمة \"هَدِيٌّ\" في قول الشاعر \"وما طبرية إلا هديّ\":", options: ["هدية", "طريق", "عروس", "حصن"], correct: 2 },
            { question: "معنى كلمة \"بذَّ\" في القصيدة:", options: ["أعطى", "فاق", "خذل", "ساوى"], correct: 1 },
            { question: "المقصود بكلمة \"حصان\" في عبارة \"حصان الذيل\":", options: ["الخيل السريع", "المرأة العفيفة", "القوة", "السيف"], correct: 1 },
            { question: "البيت الذي يصور القدس كإنسان يهتز ابتهاجاً هو:", options: ["جَلَتْ عزامتك", "غَدَت في وجنة الأيام", "تهزُّ معاطف القدس", "فلو أنَّ الجماد"], correct: 2 },
            { question: "المعنى الذي أفاده حرف الجر (مِنْ) في \"جاء مِنْ تضافر الجهود\":", options: ["التبعيض", "بيان الجنس", "السببية", "الغاية المكانية"], correct: 2 },
            { question: "حرف الجر الذي يفيد انتهاء الغاية المكانية في \"توجهتُ إلى بيت المقدس\":", options: ["في", "على", "إلى", "من"], correct: 2 },
            { question: "المعنى الذي أفاده حرف الجر (في) في \"انتصروا في حيلة عسكرية\":", options: ["الظرفية", "السببية", "المجاوزة", "التبعيض"], correct: 1 },
            { question: "في جملة \"تخطو الأقدام على أرضه\"، أفاد حرف الجر (على):", options: ["الاستعلاء المجازي", "الاستعلاء الحقيقي", "التعليل", "التشبيه"], correct: 1 },
            { question: "\"الشهداء كالمصابيح\"، حرف الكاف هنا يفيد:", options: ["السببية", "الملكية", "التشبيه", "الظرفية"], correct: 2 },
            { question: "المعنى الذي أفاده حرف (عَنْ) في \"يجلو عَنْ بيت المقدس المظالم\":", options: ["البدلية", "المجاوزة والبعد", "الاستعانة", "بيان الجنس"], correct: 1 },
            { question: "حرف اللام في \"أنفق ممتلكاته لخدمة المدينة\" يفيد:", options: ["الملكية", "التعليل", "الاختصاص", "انتهاء الغاية"], correct: 1 },
            { question: "معنى كلمة \"جُوناً\" في قول الشاعر \"كانت بها الأيام جُوناً\":", options: ["بيضاء", "مشرقة", "سوداء", "قصيرة"], correct: 2 },
            { question: "أفاد حرف الجر (مِنْ) في \"لبى الشجعان مِنَ المسلمين\" معنى:", options: ["التبعيض", "بيان الجنس", "الزمان", "السببية"], correct: 1 },
            { question: "العاطفة المسيطرة على الشاعر في قصيدة \"فتح طبرية\" هي:", options: ["الحزن", "الفخر والإعجاب", "الزهد", "الشوق"], correct: 1 },
            { question: "شبه الشاعر صلاح الدين الأيوبي في حسن تدبيره بـ:", options: ["النبي يوسف", "النبي سليمان", "حاتم الطائي", "ذي القرنين"], correct: 0 },
            { question: "معنى كلمة \"معقل\" في قول الشاعر \"ومعقل أعيا القرونا\":", options: ["جبل", "حصن", "بئر", "ممر"], correct: 1 },
            { question: "حرف الجر (الباء) في عبارة \"ومستعيناً بالله\" يفيد:", options: ["الظرفية", "السببية", "الاستعانة", "الإلصاق"], correct: 2 },
            { question: "حرف اللام في \"للصليبيين\" في جملة \"صار ملكاً للصليبيين برهة\":", options: ["الملكية", "الاختصاص", "التعليل", "التبعيض"], correct: 1 }
        ];

        // وحدة 2: من الأدب الإفريقي
        const unit2Questions = [
            { question: "مؤلف قصة \"حفنة تمر\" هو الأديب:", options: ["نجيب محفوظ", "الطيب صالح", "طه حسين", "عباس العقاد"], correct: 1 },
            { question: "الشخصية التي تمثل الضحية في قصة \"حفنة تمر\" هي:", options: ["الجد", "مسعود", "الطفل", "شيخ المسجد"], correct: 1 },
            { question: "سبب خسارة مسعود لأرضه كما ذكر الجد هو أنه رجل:", options: ["كريم", "مِزواج", "كسول", "مريض"], correct: 1 },
            { question: "معنى كلمة \"الحفنة\" هي:", options: ["ملء الكف", "كيس كبير", "حبة واحدة", "ميزان"], correct: 0 },
            { question: "معنى \"يربّتون على رأسي\" في القصة:", options: ["يمسحون", "يضربون برفق", "يشدون", "يقبلون"], correct: 1 },
            { question: "المنهج البلاغي الذي يجمع بين كلمتين متضادتين في سياق واحد يسمى:", options: ["المقابلة", "الطباق", "السجع", "الجناس"], correct: 1 },
            { question: "نوع الطباق في قوله تعالى \"هو الأول والآخر\" هو:", options: ["طباق سلب", "طباق إيجاب", "مقابلة", "جناس"], correct: 1 },
            { question: "نوع الطباق في قولنا \"يعلمون ولا يعلمون\":", options: ["طباق إيجاب", "طباق سلب", "مقابلة", "سجع"], correct: 1 },
            { question: "الجمع بين معنيين ثم ما يقابلها على الترتيب يسمى:", options: ["طباقاً", "مقابلة", "تشبيهاً", "استعارة"], correct: 1 },
            { question: "اسم الفاعل من الفعل الثلاثي \"قَرَأ\" هو:", options: ["مقروء", "قارئ", "قراءة", "قرّاء"], correct: 1 },
            { question: "اسم الفاعل من الفعل \"قادَ\" هو:", options: ["مقود", "قواد", "قائد", "قيادة"], correct: 2 },
            { question: "اسم الفاعل من الفعل \"سَعى\" هو:", options: ["مسعى", "ساعٍ", "ساعي", "مسعيّ"], correct: 1 },
            { question: "اسم المفعول من الفعل \"غُرِس\" هو:", options: ["غارس", "مغروس", "انغراس", "مغرس"], correct: 1 },
            { question: "اسم المفعول من الفعل \"دانَ\" (بمعنى عليه دين) هو:", options: ["دائن", "مديون", "مدين", "مديان"], correct: 2 },
            { question: "اسم المفعول من الفعل \"رجا\" هو:", options: ["راجٍ", "مرجوّ", "مرجيّ", "ارتجاء"], correct: 1 },
            { question: "الطفل في نهاية القصة تقيأ التمر لأنه شعر بـ:", options: ["المرض", "الشبع", "القهر والظلم", "الجوع"], correct: 2 },
            { question: "معنى كلمة \"الطلح\" الواردة في القصة:", options: ["شجر بري", "نوع من النخل", "رمل ناعم", "ثوب ممزق"], correct: 0 },
            { question: "\"العدل والظلم\" في جملة واحدة تمثل:", options: ["طباق سلب", "طباق إيجاب", "مقابلة", "سجع"], correct: 1 },
            { question: "اسم الفاعل من الفعل غير الثلاثي \"انطلق\" هو:", options: ["مُنطلَق", "مُنطلِق", "انطلاق", "ناطلق"], correct: 1 },
            { question: "صياغة اسم المفعول من الفعل اللازم تتطلب:", options: ["تضعيف الحرف", "إضافة شبه جملة", "كسر الآخر", "حذف الواو"], correct: 1 }
        ];

        // وحدة 3: من القيم الإنسانية
        const unit3Questions = [
            { question: "صاحب قصيدة \"الأسلحة والأطفال\" هو الشاعر العراقي:", options: ["نزار قباني", "بدر شاكر السياب", "محمود درويش", "أدونيس"], correct: 1 },
            { question: "تنتمي قصيدة \"الأسلحة والأطفال\" إلى شعر:", options: ["التفعيلة (الحر)", "الشطرين (العمودي)", "الرباعيات", "الموشحات"], correct: 0 },
            { question: "معنى كلمة \"آيِب\" في قول الشاعر \"وكم من أبٍ آيبٍ\":", options: ["غائب", "عائد", "مسافر", "حزين"], correct: 1 },
            { question: "المقصود بـ \"درء الطِّوى\" في القصيدة:", options: ["دفع الموت", "دفع الجوع", "طلب العلم", "بناء البيوت"], correct: 1 },
            { question: "اسم المكان من الفعل \"صَنَع\" هو:", options: ["صانع", "مصنوع", "مَصْنَع", "صنيع"], correct: 2 },
            { question: "اسم الزمان من الفعل \"وَلَد\" هو:", options: ["والد", "مولود", "مَوْلِد", "ميلاد"], correct: 2 },
            { question: "اسم المكان من الفعل \"رَمى\" هو:", options: ["رامي", "مَرْمى", "مرمي", "رماية"], correct: 1 },
            { question: "اسم المكان من الفعل \"هَبَط\" (بكسر العين في المضارع):", options: ["مَهْبَط", "مَهْبِط", "هباط", "مهبوط"], correct: 1 },
            { question: "جمع التكسير الذي يدل على العدد من (3-10) يسمى:", options: ["جمع كثرة", "جمع قلة", "جمع مذكر سالم", "اسم جمع"], correct: 1 },
            { question: "أحد الأوزان الآتية هو من أوزان جمع القلة:", options: ["فُعول", "أَفْعُل", "فُعَل", "مَفاعِل"], correct: 1 },
            { question: "كلمة \"فِتْيَة\" هي جمع تكسير على وزن:", options: ["أَفْعِلَة", "فِعْلَة", "أَفْعال", "فُعول"], correct: 1 },
            { question: "كلمة \"أَسْياف\" هي جمع:", options: ["كثرة", "قلة", "مؤنث سالم", "مذكر سالم"], correct: 1 },
            { question: "كلمة \"قُلوب\" هي جمع تكسير لنوع:", options: ["القلة", "الكثرة", "المذكر السالم", "المنتهي بألف ونون"], correct: 1 },
            { question: "معنى كلمة \"الرّمضاء\" في القصيدة:", options: ["شدة البرد", "شدة الحر", "الغبار", "المطر"], correct: 1 },
            { question: "استخدم السياب رمز \"السندباد\" ليدل على:", options: ["القائد الحربي", "الباحث عن الأمل", "التاجر الجشع", "الطفل اليتيم"], correct: 1 },
            { question: "اسم الزمان من الفعل غير الثلاثي \"استقبل\" هو:", options: ["مستقبِل", "مُستقبَل", "استقبال", "قابيل"], correct: 1 },
            { question: "معنى \"يُصلصل\" في عبارة \"محارٌ يُصلصل\":", options: ["يلمع", "يصدر صوتاً", "يختفي", "ينكسر"], correct: 1 },
            { question: "وزن جمع القلة في كلمة \"أروقة\":", options: ["أَفْعُل", "أَفْعِلَة", "فِعْلَة", "أَفْعال"], correct: 1 },
            { question: "معنى كلمة \"شطَّ\" في \"شطَّ المزار\":", options: ["قرب", "بعد", "جف", "امتلأ"], correct: 1 },
            { question: "العاطفة المسيطرة على قصيدة \"الأسلحة والأطفال\" هي:", options: ["حب السلاح", "الألم على الطفولة", "كره السفر", "الفرح بالحروب"], correct: 1 }
        ];

        // وحدة 4: فن المقامات
        const unit4Questions = [
            { question: "رائد فن المقامات هو:", options: ["الحريري", "بديع الزمان الهمذاني", "الجاحظ", "ابن المقفع"], correct: 1 },
            { question: "بطل مقامات الهمذاني يسمى:", options: ["عيسى بن هشام", "أبو الفتح الإسكندري", "السندباد", "جحا"], correct: 1 },
            { question: "راوي مقامات الهمذاني يسمى:", options: ["أبو الفتح الإسكندري", "عيسى بن هشام", "ابن الساعاتي", "المتنبي"], correct: 1 },
            { question: "تعتمد المقامات في أسلوبها بشكل أساسي على:", options: ["الشعر الحر", "السجع والمحسنات", "اللغة البسيطة", "الأرقام"], correct: 1 },
            { question: "معنى كلمة \"الحرز\" في \"المقامة الحرزية\":", options: ["الكنز", "التميمة", "السجن", "السيف"], correct: 1 },
            { question: "معنى كلمة \"تِبراً\" في المقامة:", options: ["تراباً", "ذهباً", "حريراً", "ماءً"], correct: 1 },
            { question: "اسم المرة من الفعل الثلاثي \"جَلَس\" هو:", options: ["جِلسة", "جَلْسة", "جلوس", "مجالس"], correct: 1 },
            { question: "اسم الهيئة من الفعل الثلاثي \"جَلَس\" هو:", options: ["جَلْسة", "جِلسة", "جالس", "تجليس"], correct: 1 },
            { question: "إذا كان المصدر الأصلي ينتهي بتاء، يصاغ اسم المرة بـ:", options: ["حذف التاء", "إضافة كلمة واحدة", "كسر الفاء", "زيادة ألف"], correct: 1 },
            { question: "اسم المرة من الفعل غير الثلاثي \"انطلق\" هو:", options: ["انطلاقة", "انطلاق", "مُنطلَق", "نطلاقة"], correct: 0 },
            { question: "التفعيلة الرئيسية لبحر المتدارك هي:", options: ["فاعِلاتن", "فاعِلُن", "مُتفاعِلُن", "مَفاعيلُن"], correct: 1 },
            { question: "مفتاح بحر المتدارك هو:", options: ["رمل الأبحر", "حركات المحدث", "طويل له", "كمل الجمال"], correct: 1 },
            { question: "معنى كلمة \"الُحشاشة\" في المقامة:", options: ["بقية الروح", "نوع من العشب", "البيت القديم", "الصديق"], correct: 0 },
            { question: "معنى \"أَقِطاً\" في \"امتلأ رحلنا أقطاً\":", options: ["ثياباً", "لبناً مجففاً", "ذهباً", "سيوفاً"], correct: 1 },
            { question: "اسم الهيئة يدل على:", options: ["وقوع الفعل مرة", "هيئة وقوع الفعل", "زمان الفعل", "مكان الفعل"], correct: 1 },
            { question: "اسم المرة من \"دعا\" هو:", options: ["دعاء", "دِعوة", "دَعوة واحدة", "مدعوّ"], correct: 2 },
            { question: "الصورة الفرعية للتفعيلة (فاعِلُن) في المتدارك هي:", options: ["فَعِلُن", "مَفاعِلُن", "فاعِلاتُ", "مُتَفعلُن"], correct: 0 },
            { question: "يسمى بحر المتدارك أيضاً بـ:", options: ["الرجز", "المحدث", "الكامل", "الطويل"], correct: 1 },
            { question: "معنى كلمة \"الخُفّ\" في المقامة الموصلية:", options: ["الحذاء", "السرعة", "التعب", "الخوف"], correct: 0 },
            { question: "الفكرة الأساسية في مقامات الهمذاني هي:", options: ["الزهد", "الكُدية", "الفلسفة", "التاريخ"], correct: 1 }
        ];

        // وحدة 5: الذكاء الاصطناعي
        const unit5Questions = [
            { question: "واضع مصطلح \"الذكاء الاصطناعي\" هو:", options: ["بليز باسكال", "جون ماكارثي", "ستيفن هوكينج", "أينشتاين"], correct: 1 },
            { question: "الذكاء الاصطناعي الذي يختص بمجال واحد يسمى:", options: ["العام", "الضعيف", "الفائق", "البشري"], correct: 1 },
            { question: "الأساس الذي تستند إليه برامج الذكاء الاصطناعي هو:", options: ["الشاشات", "الخوارزميات", "سرعة الإنترنت", "الكهرباء"], correct: 1 },
            { question: "معنى كلمة \"الأتمتة\" هي:", options: ["الكتابة باليد", "التشغيل الآلي", "الرسم الهندسي", "المحادثة"], correct: 1 },
            { question: "اسم الآلة من الفعل \"نَشَرَ\" هو:", options: ["ناشر", "مَنْشور", "مِنْشار", "منشرة"], correct: 2 },
            { question: "اسم الآلة من الفعل \"بَرَدَ\" هو:", options: ["بارد", "مَبْرَد", "براد", "تبريد"], correct: 1 },
            { question: "اسم الآلة من الفعل \"طَرَقَ\" هو:", options: ["طارق", "مِطْرَقَة", "طريق", "مطروق"], correct: 1 },
            { question: "اسم الآلة \"غسّالة\" على وزن:", options: ["مِفْعَل", "فَعّالَة", "مِفْعال", "فاعول"], correct: 1 },
            { question: "اسم الآلة \"حاسوب\" على وزن:", options: ["فاعول", "مِفْعال", "فَعّالة", "مِفْعَل"], correct: 0 },
            { question: "التفعيلة الرئيسية لبحر الرمل هي:", options: ["فاعِلُن", "فاعِلاتُن", "مُسْتفعلن", "مَفاعيلُن"], correct: 1 },
            { question: "مفتاح بحر الرمل هو:", options: ["رمل الأبحر", "حركات المحدث", "لجمال البحور", "بحر الرمل"], correct: 0 },
            { question: "خوارزمية كومباس تستخدم في مجال:", options: ["الطب", "القضاء والجرائم", "الزراعة", "الفضاء"], correct: 1 },
            { question: "أحد الأوزان الآتية هو وزن مشتق لاسم الآلة:", options: ["مِفْعال", "فاعِل", "مَفْعول", "فَعول"], correct: 0 },
            { question: "كلمة \"قلم\" هي اسم آلة:", options: ["مشتق", "جامد (سماعي)", "على وزن مِفْعَل", "من الفعل قَلَمَ"], correct: 1 },
            { question: "المقصود بـ \"ذوي الياقات الزرقاء\" هم:", options: ["عمال مكتب", "عمال يدويين", "عمال إدارة", "عمال برمجة"], correct: 1 },
            { question: "إحدى الصور الفرعية لـ (فاعِلاتُن) في الرمل هي:", options: ["فَعِلاتُن", "فاعِلُن", "فَعِلُن", "مَفاعيلُن"], correct: 0 },
            { question: "تكرار تفعيلة بحر الرمل في مجزوء الرمل يكون:", options: ["6 مرات", "4 مرات", "8 مرات", "مرتين"], correct: 1 },
            { question: "معنى \"سَبْر أغوار\" البحث العلمي:", options: ["إغلاقه", "معرفة عمقه", "تركه", "تكراره"], correct: 1 },
            { question: "وصف الكاتب الذكاء الاصطناعي بأنه سيف ذو حدين بسبب:", options: ["شكله", "فوائده ومخاطره", "استخدامه بالحروب", "ثمنه"], correct: 1 },
            { question: "اسم الآلة \"مِفتاح\" على وزن:", options: ["مِفْعَل", "مِفْعال", "فَعّالة", "فاعول"], correct: 1 }
        ];

        // ==================== متغيرات التطبيق ====================
        let currentQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let currentUnit = '';
        let timeoutId = null;

        // عناصر DOM
        const mainMenu = document.getElementById('mainMenu');
        const quizArea = document.getElementById('quizArea');
        const resultScreen = document.getElementById('resultScreen');
        const unitName = document.getElementById('unitName');
        const questionCounter = document.getElementById('questionCounter');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const finalScore = document.getElementById('finalScore');
        const resultDetails = document.getElementById('resultDetails');

        const unitNames = {
            'unit1': 'في رحاب القدس',
            'unit2': 'من الأدب الإفريقي',
            'unit3': 'من القيم الإنسانية',
            'unit4': 'فن المقامات',
            'unit5': 'الذكاء الاصطناعي',
            'final': 'الامتحان الشامل'
        };

        // ==================== الدوال الرئيسية ====================
        
        window.startQuiz = function(unit) {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            currentUnit = unit;
            currentIndex = 0;
            
            if (unit === 'unit1') currentQuestions = [...unit1Questions];
            else if (unit === 'unit2') currentQuestions = [...unit2Questions];
            else if (unit === 'unit3') currentQuestions = [...unit3Questions];
            else if (unit === 'unit4') currentQuestions = [...unit4Questions];
            else if (unit === 'unit5') currentQuestions = [...unit5Questions];
            else if (unit === 'final') {
                let allQuestions = [...unit1Questions, ...unit2Questions, ...unit3Questions, ...unit4Questions, ...unit5Questions];
                // خلط الأسئلة
                for (let i = allQuestions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allQuestions[i], allQuestions[j]] = [allQuestions[j], allQuestions[i]];
                }
                currentQuestions = allQuestions.slice(0, 50);
            }
            
            userAnswers = new Array(currentQuestions.length).fill(null);
            
            mainMenu.classList.add('hidden');
            resultScreen.classList.add('hidden');
            quizArea.classList.remove('hidden');
            
            unitName.textContent = unitNames[unit];
            displayQuestion();
        };

        function displayQuestion() {
            const q = currentQuestions[currentIndex];
            questionText.textContent = q.question;
            questionCounter.textContent = `السؤال ${currentIndex + 1} من ${currentQuestions.length}`;
            
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                let btnClass = 'option-btn';
                
                // لو السؤال ده متجاوب عليه
                if (userAnswers[currentIndex] !== null) {
                    if (idx === userAnswers[currentIndex].selected) {
                        btnClass += ' selected';
                    }
                }
                
                optionsHtml += `<button class="${btnClass}" onclick="selectAnswer(${idx})">${opt}</button>`;
            });
            optionsContainer.innerHTML = optionsHtml;
            
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === currentQuestions.length - 1);
        }

        window.selectAnswer = function(optionIndex) {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            // حفظ الإجابة
            userAnswers[currentIndex] = {
                selected: optionIndex,
                isCorrect: (optionIndex === currentQuestions[currentIndex].correct)
            };
            
            displayQuestion();
            
            // الانتقال التلقائي للسؤال التالي
            if (currentIndex < currentQuestions.length - 1) {
                timeoutId = setTimeout(() => {
                    currentIndex++;
                    displayQuestion();
                    timeoutId = null;
                }, 500);
            } else {
                timeoutId = setTimeout(() => {
                    showResult();
                    timeoutId = null;
                }, 500);
            }
        };

        window.prevQuestion = function() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            if (currentIndex > 0) {
                currentIndex--;
                displayQuestion();
            }
        };

        window.nextQuestion = function() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                displayQuestion();
            }
        };

        function showResult() {
            quizArea.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            let correctCount = userAnswers.filter(a => a && a.isCorrect).length;
            finalScore.textContent = `${correctCount} / ${currentQuestions.length}`;
            
            let detailsHtml = '';
            currentQuestions.forEach((q, idx) => {
                const answer = userAnswers[idx];
                const isCorrect = answer ? answer.isCorrect : false;
                const userAnswerText = answer ? q.options[answer.selected] : 'لم تجب';
                const correctText = q.options[q.correct];
                
                detailsHtml += `
                    <div class="result-item ${isCorrect ? 'correct' : 'wrong'}">
                        <strong>سؤال ${idx + 1}:</strong> ${q.question}<br>
                        <span>✧ إجابتك: ${userAnswerText}</span><br>
                        <span>✧ الإجابة الصحيحة: ${correctText}</span>
                    </div>
                `;
            });
            resultDetails.innerHTML = detailsHtml;
        }

        window.backToMenu = function() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            mainMenu.classList.remove('hidden');
            quizArea.classList.add('hidden');
            resultScreen.classList.add('hidden');
        };
    </script>
</body>
</html>
