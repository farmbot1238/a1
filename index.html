<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم العربي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #2d1a0f 0%, #4a2e1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            font-family: 'Cairo', 'Amiri', sans-serif;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background-color: #fef7e9;
            border-radius: 40px 40px 20px 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            padding: 30px 25px;
            border: 2px solid #b48647;
            position: relative;
        }
        
        h1 {
            text-align: center;
            color: #7a4f24;
            margin-bottom: 30px;
            font-size: 3.2em;
            font-family: 'Amiri', serif;
            font-weight: 700;
            border-bottom: 3px solid #c9a063;
            padding-bottom: 15px;
            text-shadow: 3px 3px 0 #f0dbb4;
        }
        
        h1::after {
            content: "⚘";
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            color: #b47d47;
            background-color: #fef7e9;
            padding: 0 20px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: #7a4f24;
        }
        
        .main-menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }
        
        .menu-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        
        .menu-btn {
            flex: 1 1 160px;
            padding: 18px 15px;
            font-size: 1.3em;
            font-weight: 700;
            border: none;
            border-radius: 60px 20px 60px 20px;
            background: linear-gradient(145deg, #ac7b3f, #7a4f24);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 0 #4a2e1a;
            text-align: center;
            min-width: 160px;
            font-family: 'Cairo', sans-serif;
            border: 2px solid #e5b87b;
        }
        
        .menu-btn:hover {
            background: linear-gradient(145deg, #be8b4f, #8b5f34);
            transform: translateY(-5px);
            box-shadow: 0 13px 0 #4a2e1a;
        }
        
        .menu-btn.special {
            background: linear-gradient(145deg, #b35e1f, #7a431d);
        }
        
        .quiz-area {
            margin-top: 20px;
            background-color: #fff9f0;
            border-radius: 30px;
            padding: 20px;
            border: 2px solid #e5c8a3;
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: linear-gradient(145deg, #7a4f24, #9b6b3b);
            padding: 15px 25px;
            border-radius: 60px;
            color: white;
            border: 2px solid #e5b87b;
        }
        
        .unit-badge, .progress {
            background-color: #f7d9a4;
            color: #4a2e1a;
            padding: 8px 25px;
            border-radius: 40px;
            font-size: 1.2em;
            font-weight: 700;
            border: 2px solid #b48647;
        }
        
        .question-text {
            font-size: 1.5em;
            font-weight: 600;
            color: #4a2e1a;
            margin-bottom: 30px;
            line-height: 1.7;
            background: linear-gradient(145deg, #fff9f0, #fff2e0);
            padding: 30px;
            border-radius: 30px 30px 30px 10px;
            border: 2px solid #d4b68a;
            border-right: 8px solid #b47d47;
            font-family: 'Amiri', serif;
        }
        
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .option-btn {
            padding: 18px 25px;
            background: linear-gradient(145deg, #ffffff, #f7efe0);
            border: 3px solid #d4b68a;
            border-radius: 50px 15px 50px 15px;
            font-size: 1.2em;
            text-align: right;
            cursor: pointer;
            color: #4a2e1a;
            font-weight: 600;
            box-shadow: 0 5px 0 #b48647;
            font-family: 'Cairo', sans-serif;
            width: 100%;
        }
        
        .option-btn:hover {
            background: linear-gradient(145deg, #f7efe0, #ffffff);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #b48647;
            border-color: #b47d47;
        }
        
        .option-btn.selected {
            background: linear-gradient(145deg, #b47d47, #9b6b3b);
            color: white;
            border-color: #7a4f24;
            box-shadow: 0 5px 0 #4a2e1a;
            transform: translateY(2px);
        }
        
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 15px 25px;
            font-size: 1.2em;
            font-weight: 700;
            border: none;
            border-radius: 40px 15px 40px 15px;
            background: linear-gradient(145deg, #d4b68a, #b48647);
            color: #2d1a0f;
            cursor: pointer;
            border: 2px solid #e5c8a3;
            box-shadow: 0 5px 0 #7a4f24;
            flex: 1;
            min-width: 120px;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: linear-gradient(145deg, #e5c8a3, #c9a063);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #7a4f24;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(3px);
            box-shadow: 0 2px 0 #7a4f24;
        }
        
        .result-screen {
            text-align: center;
            padding: 15px;
        }
        
        .result-box {
            background: linear-gradient(145deg, #fff9f0, #fff2e0);
            border-radius: 50px 20px 50px 20px;
            padding: 40px 30px;
            margin-top: 15px;
            border: 4px solid #b47d47;
        }
        
        .result-score {
            font-size: 5em;
            font-weight: 800;
            color: #b47d47;
            margin: 20px 0;
            font-family: 'Amiri', serif;
        }
        
        .result-details {
            max-height: 500px;
            overflow-y: auto;
            text-align: right;
            margin-top: 30px;
            border-top: 3px solid #d4b68a;
            padding: 25px;
            background: white;
            border-radius: 30px;
        }
        
        .result-item {
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 20px;
            border-right: 8px solid #b48647;
            background: #f5e9d9;
        }
        
        .result-item.correct {
            border-right-color: #2e7d32;
            background: #e8f5e9;
        }
        
        .result-item.wrong {
            border-right-color: #b71c1c;
            background: #ffebee;
        }
        
        .restart-btn {
            margin-top: 30px;
            padding: 18px 50px;
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(145deg, #b47d47, #7a4f24);
            color: white;
            border: none;
            border-radius: 60px 20px 60px 20px;
            cursor: pointer;
            border: 2px solid #e5b87b;
            box-shadow: 0 8px 0 #4a2e1a;
        }
        
        .restart-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 13px 0 #4a2e1a;
        }
        
        .hidden {
            display: none;
        }
        
        .decor-line {
            height: 4px;
            background: linear-gradient(90deg, transparent, #b47d47, #e5b87b, #b47d47, transparent);
            margin: 25px 0 15px;
        }
        
        .error-message {
            text-align: center;
            padding: 40px;
            background: #ffebee;
            border-radius: 20px;
            color: #c62828;
            font-size: 1.2em;
            border: 2px solid #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>قسم العربي</h1>
        <div class="decor-line"></div>

        <!-- شاشة التحميل -->
        <div id="loadingScreen" class="loading">
            جاري تحميل الأسئلة...<br>
            <span style="font-size: 40px;">📚</span>
        </div>

        <!-- القائمة الرئيسية -->
        <div id="mainMenu" class="main-menu hidden">
            <div class="menu-row">
                <button class="menu-btn" data-unit="unit1">في رحاب القدس</button>
                <button class="menu-btn" data-unit="unit2">من الأدب الإفريقي</button>
                <button class="menu-btn" data-unit="unit3">من القيم الإنسانية</button>
            </div>
            <div class="menu-row">
                <button class="menu-btn" data-unit="unit4">فن المقامات</button>
                <button class="menu-btn" data-unit="unit5">الذكاء الاصطناعي</button>
                <button class="menu-btn special" data-unit="final">الامتحان الشامل</button>
            </div>
        </div>

        <!-- منطقة الامتحان -->
        <div id="quizArea" class="quiz-area hidden">
            <div class="question-header">
                <span id="unitName" class="unit-badge"></span>
                <span id="questionCounter" class="progress"></span>
            </div>
            <div id="questionText" class="question-text"></div>
            <div id="optionsContainer" class="options-container"></div>
            <div class="nav-buttons">
                <button id="prevBtn" class="nav-btn">السابق</button>
                <button id="nextBtn" class="nav-btn">التالي</button>
                <button id="backToMenuBtn" class="nav-btn">القائمة</button>
            </div>
        </div>

        <!-- شاشة النتيجة -->
        <div id="resultScreen" class="result-screen hidden">
            <div class="result-box">
                <h2>النتيجة النهائية</h2>
                <div id="finalScore" class="result-score"></div>
                <div class="decor-line"></div>
                <div id="resultDetails" class="result-details"></div>
                <button id="restartBtn" class="restart-btn">العودة للقائمة</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== متغيرات التطبيق ====================
        let allQuestionsData = null;
        let currentQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let currentUnit = '';
        let timeoutId = null;

        // عناصر DOM
        const loadingScreen = document.getElementById('loadingScreen');
        const mainMenu = document.getElementById('mainMenu');
        const quizArea = document.getElementById('quizArea');
        const resultScreen = document.getElementById('resultScreen');
        const unitName = document.getElementById('unitName');
        const questionCounter = document.getElementById('questionCounter');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const backToMenuBtn = document.getElementById('backToMenuBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScore = document.getElementById('finalScore');
        const resultDetails = document.getElementById('resultDetails');

        const unitNames = {
            'unit1': 'في رحاب القدس',
            'unit2': 'من الأدب الإفريقي',
            'unit3': 'من القيم الإنسانية',
            'unit4': 'فن المقامات',
            'unit5': 'الذكاء الاصطناعي',
            'final': 'الامتحان الشامل'
        };

        // ==================== تحميل الأسئلة ====================
        async function loadQuestions() {
            try {
                const response = await fetch('questions.json');
                if (!response.ok) {
                    throw new Error('فشل تحميل الأسئلة');
                }
                allQuestionsData = await response.json();
                
                loadingScreen.classList.add('hidden');
                mainMenu.classList.remove('hidden');
                
            } catch (error) {
                loadingScreen.innerHTML = `
                    <div class="error-message">
                        ⚠️ حدث خطأ في تحميل الأسئلة ⚠️<br>
                        ${error.message}<br>
                        يرجى التأكد من وجود ملف questions.json في نفس المجلد
                    </div>
                `;
                console.error('خطأ:', error);
            }
        }

        // ==================== بدء الامتحان ====================
        function startQuiz(unit) {
            if (!allQuestionsData) {
                alert('الأسئلة لم يتم تحميلها بعد، يرجى الانتظار');
                return;
            }
            
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            currentUnit = unit;
            currentIndex = 0;
            
            if (unit === 'unit1') currentQuestions = [...allQuestionsData.unit1];
            else if (unit === 'unit2') currentQuestions = [...allQuestionsData.unit2];
            else if (unit === 'unit3') currentQuestions = [...allQuestionsData.unit3];
            else if (unit === 'unit4') currentQuestions = [...allQuestionsData.unit4];
            else if (unit === 'unit5') currentQuestions = [...allQuestionsData.unit5];
            else if (unit === 'final') {
                let allQuestions = [
                    ...allQuestionsData.unit1,
                    ...allQuestionsData.unit2,
                    ...allQuestionsData.unit3,
                    ...allQuestionsData.unit4,
                    ...allQuestionsData.unit5
                ];
                for (let i = allQuestions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allQuestions[i], allQuestions[j]] = [allQuestions[j], allQuestions[i]];
                }
                currentQuestions = allQuestions.slice(0, 50);
            }
            
            userAnswers = new Array(currentQuestions.length).fill(null);
            
            mainMenu.classList.add('hidden');
            resultScreen.classList.add('hidden');
            quizArea.classList.remove('hidden');
            
            unitName.textContent = unitNames[unit];
            displayQuestion();
        }

        function displayQuestion() {
            const q = currentQuestions[currentIndex];
            questionText.textContent = q.question;
            questionCounter.textContent = `السؤال ${currentIndex + 1} من ${currentQuestions.length}`;
            
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                let btnClass = 'option-btn';
                if (userAnswers[currentIndex] !== null && idx === userAnswers[currentIndex].selected) {
                    btnClass += ' selected';
                }
                optionsHtml += `<button class="${btnClass}" onclick="selectAnswer(${idx})">${opt}</button>`;
            });
            optionsContainer.innerHTML = optionsHtml;
            
            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === currentQuestions.length - 1);
        }

        window.selectAnswer = function(optionIndex) {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            
            userAnswers[currentIndex] = {
                selected: optionIndex,
                isCorrect: (optionIndex === currentQuestions[currentIndex].correct)
            };
            
            displayQuestion();
            
            if (currentIndex < currentQuestions.length - 1) {
                timeoutId = setTimeout(() => {
                    currentIndex++;
                    displayQuestion();
                    timeoutId = null;
                }, 500);
            } else {
                timeoutId = setTimeout(() => {
                    showResult();
                    timeoutId = null;
                }, 500);
            }
        };

        window.prevQuestion = function() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            if (currentIndex > 0) {
                currentIndex--;
                displayQuestion();
            }
        };

        window.nextQuestion = function() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                displayQuestion();
            }
        };

        function showResult() {
            quizArea.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            let correctCount = userAnswers.filter(a => a && a.isCorrect).length;
            finalScore.textContent = `${correctCount} / ${currentQuestions.length}`;
            
            let detailsHtml = '';
            currentQuestions.forEach((q, idx) => {
                const answer = userAnswers[idx];
                const isCorrect = answer ? answer.isCorrect : false;
                const userAnswerText = answer ? q.options[answer.selected] : 'لم تجب';
                const correctText = q.options[q.correct];
                
                detailsHtml += `
                    <div class="result-item ${isCorrect ? 'correct' : 'wrong'}">
                        <strong>سؤال ${idx + 1}:</strong> ${q.question}<br>
                        <span>✧ إجابتك: ${userAnswerText}</span><br>
                        <span>✧ الإجابة الصحيحة: ${correctText}</span>
                    </div>
                `;
            });
            resultDetails.innerHTML = detailsHtml;
        }

        function backToMenu() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            mainMenu.classList.remove('hidden');
            quizArea.classList.add('hidden');
            resultScreen.classList.add('hidden');
        }

        // ربط الأحداث
        prevBtn.onclick = prevQuestion;
        nextBtn.onclick = nextQuestion;
        backToMenuBtn.onclick = backToMenu;
        restartBtn.onclick = backToMenu;
        
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.onclick = () => startQuiz(btn.dataset.unit);
        });

        // تحميل الأسئلة
        loadQuestions();
    </script>
</body>
</html>
